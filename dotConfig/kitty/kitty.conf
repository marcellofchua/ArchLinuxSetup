# Bell Settings
enable_audio_bell	yes
bell_path		none

# Terminal Settings
background_opacity	0.5
allow_hyperlinks	yes

# Cursor Settings
cursor_trail		2
cursor_shape		block
cursor_blink		true

# BEGIN_KITTY_FONTS
font_family      family='JetBrains Mono' postscript_name=JetBrainsMono-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size	 10
# END_KITTY_FONTS

# BEGIN_KITTY_THEME
# Black Metal
include current-theme.conf
# END_KITTY_THEME
