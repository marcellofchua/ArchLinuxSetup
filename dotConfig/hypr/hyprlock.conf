################
### Hyprlock ###
################
input-field {
# Main Settings
	size = 420, 69
	outline_thickness = 2
	dots_size = 0.4
	dots_spacing = 0.4
	dots_center = true
	check_color = rgba(0, 0, 0, 0)
	outer_color = rgba(0, 0, 0, 0)
	inner_color = rgba(0, 0, 0, 0)
	font_color = rgba(221, 153, 153, 1)
	fade_on_empty = false
	font_family = "JetBrains Mono Nerd Font"
	placeholder_text =
	hide_input = false
	position = 0, 0
	halign = center
	valign = center

# Fail Settings
	fail_color = rgba(255, 0, 0, 1)
	fail_text = "bruh, gtfo off my computer lol"
}

background {
	path = ~/Pictures/Wallpapers/dark-wave.jpg
	blur_passes = 2
	blur_size = 2
}
